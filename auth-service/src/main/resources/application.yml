spring:
    application:
        name: auth-service
    datasource:
        url: jdbc:mysql://localhost:8889/auth_db
        username: root
        password: root
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
server:
    port: 8083
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
