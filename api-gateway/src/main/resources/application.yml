spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://localhost:8888
  
  cloud:    
    gateway:
      server:
        webmvc:
          routes:
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/accounts/**
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/customers/**
            - id: transaction-service
              uri: lb://transaction-service
              predicates:
                - Path=/transactions/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notifications/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    