spring:
  application:
    name: api-gateway
  cloud:    
    gateway:
      server:
        webmvc:
          routes:
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/accounts/**
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/customers/**
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true